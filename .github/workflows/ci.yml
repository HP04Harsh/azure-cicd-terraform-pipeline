name: Trigger Jenkins

on:
  push:
    branches:
      - main

jobs:
  initialize:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Jenkins Job
        run: |
          curl -X POST "http://20.219.186.61:8080/job/megalab/build?token=mytoken123" \
          --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_API_TOKEN }}"